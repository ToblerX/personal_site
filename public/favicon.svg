  <rect x="5" y="3" width="1" height="1" fill="#ff8c00"/>
  <rect x="4" y="4" width="1" height="1" fill="#ffb347"/>
  <rect x="3" y="5" width="1" height="1" fill="#ffb347"/>
  <rect x="2" y="6" width="1" height="1" fill="#ffd699"/>

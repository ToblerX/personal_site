  <rect x="5" y="10" width="1" height="1" fill="#ff8c00"/>

  <!-- Right bracket > -->
  <rect x="10" y="3" width="1" height="1" fill="#ff8c00"/>
  <rect x="11" y="4" width="1" height="1" fill="#ffb347"/>
  <rect x="12" y="5" width="1" height="1" fill="#ffb347"/>
  <rect x="13" y="6" width="1" height="1" fill="#ffd699"/>

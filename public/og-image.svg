<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .pixel-title { font-family: 'Press Start 2P', 'Courier New', monospace; font-size: 42px; fill: #e0e0e0; }
      .pixel-subtitle { font-family: 'Press Start 2P', 'Courier New', monospace; font-size: 20px; fill: #a855f7; }
      .pixel-url { font-family: 'Press Start 2P', 'Courier New', monospace; font-size: 16px; fill: #6b7280; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Pixel grid pattern (subtle) -->
  <g opacity="0.04">
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none" stroke="#a855f7" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Top border - pixel style -->
  <g shape-rendering="crispEdges">
    <rect x="0" y="0" width="1200" height="4" fill="#a855f7"/>
    <rect x="0" y="4" width="1200" height="2" fill="#7c3aed" opacity="0.5"/>
  </g>

  <!-- Bottom border - pixel style -->
  <g shape-rendering="crispEdges">
    <rect x="0" y="624" width="1200" height="4" fill="#00bfff"/>
    <rect x="0" y="628" width="1200" height="2" fill="#0284c7" opacity="0.5"/>
  </g>

  <!-- Large pixel lightning bolt (left side) -->
  <g shape-rendering="crispEdges" transform="translate(80, 140)">
    <!-- Scale: each pixel = 20x20 -->
    <!-- Row 0 -->
    <rect x="180" y="0" width="20" height="20" fill="#d8b4fe"/>
    <rect x="200" y="0" width="20" height="20" fill="#a855f7"/>
    <!-- Row 1 -->
    <rect x="160" y="20" width="20" height="20" fill="#d8b4fe"/>
    <rect x="180" y="20" width="20" height="20" fill="#a855f7"/>
    <!-- Row 2 -->
    <rect x="140" y="40" width="20" height="20" fill="#d8b4fe"/>
    <rect x="160" y="40" width="20" height="20" fill="#a855f7"/>
    <!-- Row 3 -->
    <rect x="120" y="60" width="20" height="20" fill="#d8b4fe"/>
    <rect x="140" y="60" width="20" height="20" fill="#a855f7"/>
    <!-- Row 4 -->
    <rect x="100" y="80" width="20" height="20" fill="#d8b4fe"/>
    <rect x="120" y="80" width="20" height="20" fill="#a855f7"/>
    <!-- Row 5 - horizontal bar -->
    <rect x="80" y="100" width="20" height="20" fill="#d8b4fe"/>
    <rect x="100" y="100" width="20" height="20" fill="#c084fc"/>
    <rect x="120" y="100" width="20" height="20" fill="#c084fc"/>
    <rect x="140" y="100" width="20" height="20" fill="#ede6ff"/>
    <rect x="160" y="100" width="20" height="20" fill="#c084fc"/>
    <rect x="180" y="100" width="20" height="20" fill="#a855f7"/>
    <rect x="200" y="100" width="20" height="20" fill="#7c3aed"/>
    <!-- Row 6 -->
    <rect x="180" y="120" width="20" height="20" fill="#d8b4fe"/>
    <rect x="200" y="120" width="20" height="20" fill="#a855f7"/>
    <!-- Row 7 -->
    <rect x="160" y="140" width="20" height="20" fill="#d8b4fe"/>
    <rect x="180" y="140" width="20" height="20" fill="#a855f7"/>
    <!-- Row 8 -->
    <rect x="140" y="160" width="20" height="20" fill="#d8b4fe"/>
    <rect x="160" y="160" width="20" height="20" fill="#a855f7"/>
    <!-- Row 9 -->
    <rect x="120" y="180" width="20" height="20" fill="#d8b4fe"/>
    <rect x="140" y="180" width="20" height="20" fill="#a855f7"/>
    <!-- Row 10 -->
    <rect x="100" y="200" width="20" height="20" fill="#d8b4fe"/>
    <rect x="120" y="200" width="20" height="20" fill="#a855f7"/>
    <!-- Row 11 -->
    <rect x="80" y="220" width="20" height="20" fill="#d8b4fe"/>
    <rect x="100" y="220" width="20" height="20" fill="#a855f7"/>
    <!-- Row 12 -->
    <rect x="60" y="240" width="20" height="20" fill="#d8b4fe"/>
    <rect x="80" y="240" width="20" height="20" fill="#a855f7"/>

    <!-- Glow pixels -->
    <rect x="220" y="0" width="20" height="20" fill="#00bfff" opacity="0.25"/>
    <rect x="220" y="100" width="20" height="20" fill="#00bfff" opacity="0.25"/>
    <rect x="40" y="240" width="20" height="20" fill="#00bfff" opacity="0.25"/>
    <rect x="60" y="260" width="20" height="20" fill="#00bfff" opacity="0.15"/>
  </g>

  <!-- Text content (right side) -->
  <text class="pixel-title" x="520" y="250">Yaroslav</text>
  <text class="pixel-title" x="520" y="310">Fedorov</text>
  <text class="pixel-subtitle" x="520" y="370">Fullstack Engineer</text>

  <!-- Pixel code brackets decoration -->
  <g shape-rendering="crispEdges" opacity="0.15">
    <!-- Left bracket < -->
    <rect x="520" y="410" width="8" height="8" fill="#00bfff"/>
    <rect x="512" y="418" width="8" height="8" fill="#00bfff"/>
    <rect x="504" y="426" width="8" height="8" fill="#00bfff"/>
    <rect x="512" y="434" width="8" height="8" fill="#00bfff"/>
    <rect x="520" y="442" width="8" height="8" fill="#00bfff"/>
    <!-- Slash / -->
    <rect x="544" y="442" width="8" height="8" fill="#00bfff"/>
    <rect x="548" y="434" width="8" height="8" fill="#00bfff"/>
    <rect x="552" y="426" width="8" height="8" fill="#00bfff"/>
    <rect x="556" y="418" width="8" height="8" fill="#00bfff"/>
    <rect x="560" y="410" width="8" height="8" fill="#00bfff"/>
    <!-- Right bracket > -->
    <rect x="580" y="410" width="8" height="8" fill="#00bfff"/>
    <rect x="588" y="418" width="8" height="8" fill="#00bfff"/>
    <rect x="596" y="426" width="8" height="8" fill="#00bfff"/>
    <rect x="588" y="434" width="8" height="8" fill="#00bfff"/>
    <rect x="580" y="442" width="8" height="8" fill="#00bfff"/>
  </g>

  <!-- Decorative pixel dots (scattered) -->
  <g shape-rendering="crispEdges" opacity="0.12">
    <rect x="950" y="100" width="6" height="6" fill="#ff69b4"/>
    <rect x="1000" y="150" width="6" height="6" fill="#a855f7"/>
    <rect x="1050" y="120" width="6" height="6" fill="#00bfff"/>
    <rect x="980" y="200" width="6" height="6" fill="#ff8c00"/>
    <rect x="1100" y="180" width="6" height="6" fill="#a855f7"/>
    <rect x="920" y="480" width="6" height="6" fill="#00bfff"/>
    <rect x="1050" y="500" width="6" height="6" fill="#ff69b4"/>
    <rect x="1100" y="460" width="6" height="6" fill="#a855f7"/>
    <rect x="980" y="520" width="6" height="6" fill="#ff8c00"/>
  </g>

  <!-- URL -->
  <text class="pixel-url" x="520" y="560">yaroslav-fedorov.site</text>
</svg>
